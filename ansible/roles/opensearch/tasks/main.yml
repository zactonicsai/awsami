---
- name: vm.max_map_count for Lucene mmaps
  ansible.posix.sysctl:
    name: vm.max_map_count
    value: "262144"
    sysctl_file: /etc/sysctl.d/99-opensearch.conf
    state: present
    reload: true

- name: Install OpenSearch RPM (admin password must be set in env at install)
  ansible.builtin.dnf:
    name: "{{ opensearch_rpm_url }}"
    state: present
    disable_gpg_check: true
  environment:
    OPENSEARCH_INITIAL_ADMIN_PASSWORD: "{{ opensearch_initial_admin_password }}"
  no_log: true

- name: Data dir
  ansible.builtin.file:
    path: "{{ opensearch_data_dir }}"
    state: directory
    owner: "{{ opensearch_user }}"
    mode: "0750"

- name: opensearch.yml
  ansible.builtin.template:
    src: opensearch.yml.j2
    dest: /etc/opensearch/opensearch.yml
    owner: "{{ opensearch_user }}"
    mode: "0640"
  notify: restart opensearch

- name: JVM heap
  ansible.builtin.copy:
    dest: /etc/opensearch/jvm.options.d/heap.options
    content: |
      -Xms{{ opensearch_heap_gb }}g
      -Xmx{{ opensearch_heap_gb }}g
  notify: restart opensearch

- name: enabled + started
  ansible.builtin.systemd_service:
    name: opensearch
    state: started
    enabled: true
    daemon_reload: true
