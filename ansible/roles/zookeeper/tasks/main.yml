---
- name: Java present (Corretto)
  ansible.builtin.dnf:
    name: "java-{{ java_corretto_version | default('21') }}-amazon-corretto-headless"
    state: present

- name: zookeeper user
  ansible.builtin.user:
    name: "{{ zookeeper_user }}"
    system: true
    shell: /sbin/nologin

- name: Download & unpack ZooKeeper
  ansible.builtin.unarchive:
    src: "{{ zookeeper_mirror }}/zookeeper-{{ zookeeper_version }}/apache-zookeeper-{{ zookeeper_version }}-bin.tar.gz"
    dest: "{{ zookeeper_install_dir }}"
    remote_src: true
    creates: "{{ zookeeper_install_dir }}/apache-zookeeper-{{ zookeeper_version }}-bin"

- name: Stable path symlink
  ansible.builtin.file:
    src: "{{ zookeeper_install_dir }}/apache-zookeeper-{{ zookeeper_version }}-bin"
    dest: /opt/zookeeper
    state: link

- name: Data dir
  ansible.builtin.file:
    path: "{{ zookeeper_data_dir }}"
    state: directory
    owner: "{{ zookeeper_user }}"
    mode: "0750"

- name: myid
  ansible.builtin.copy:
    dest: "{{ zookeeper_data_dir }}/myid"
    content: "{{ zookeeper_myid }}\n"
    owner: "{{ zookeeper_user }}"
  notify: restart zookeeper

- name: zoo.cfg
  ansible.builtin.template:
    src: zoo.cfg.j2
    dest: /opt/zookeeper/conf/zoo.cfg
    owner: "{{ zookeeper_user }}"
  notify: restart zookeeper

- name: systemd unit
  ansible.builtin.template:
    src: zookeeper.service.j2
    dest: /etc/systemd/system/zookeeper.service
  notify: restart zookeeper

- name: enabled + started
  ansible.builtin.systemd_service:
    name: zookeeper
    state: started
    enabled: true
    daemon_reload: true
