# Run from WSL2 Ubuntu on Windows desktops (no native Windows control node)
# or from the CI container. Keep the repo INSIDE the WSL filesystem
# (~/work/ansible), not under /mnt/c — world-writable perms on /mnt/c make
# Ansible ignore ansible.cfg and inventories there.
[defaults]
inventory          = inventories/dev/aws_ec2.yml
roles_path         = roles
interpreter_python = auto_silent
host_key_checking  = False
forks              = 10
stdout_callback    = yaml
timeout            = 30

[inventory]
enable_plugins = amazon.aws.aws_ec2, yaml, ini

[ssh_connection]
pipelining = True
